<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Banco Agricultura — Registrar empleado</title>
    <link th:href="@{/resources/css/estilos.css}" rel="stylesheet"/>
</head>
<body>

    <!-- TOPBAR -->
    <nav class="topbar">
        <div class="brand">
            <div class="brand-icon-sm" style="background:var(--amber)">BA</div>
            <span class="brand-text">Banco Agricultura</span>
        </div>
        <div class="user-info">
            <span class="user-badge badge-gerente-s">Gte. Sucursal</span>
            <a href="/banco-agricultura/login" class="btn-logout">Cerrar sesión</a>
        </div>
    </nav>

    <div class="app-layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-label">Menú</div>
            <a href="/banco-agricultura/gerente-sucursal/menu" class="nav-item">
                Panel principal
            </a>
            <a href="/banco-agricultura/gerente-sucursal/registrar-empleado"
               class="nav-item active-amber">
                Registrar empleado
            </a>
            <a href="/banco-agricultura/gerente-sucursal/empleados" class="nav-item">
                Lista de empleados
            </a>
            <a href="/banco-agricultura/gerente-sucursal/prestamos" class="nav-item">
                Casos de préstamos
            </a>
        </aside>

        <!-- CONTENIDO -->
        <main class="main-content">
            <div class="page-header">
                <a href="/banco-agricultura/gerente-sucursal/menu"
                   style="font-size:13px; color:#6B7280; text-decoration:none;">
                    ← Menú
                </a>
                <div class="page-title" style="margin-top:8px;">Nuevo empleado</div>
            </div>

            <div class="card" style="max-width:500px;">
                <form action="/banco-agricultura/gerente-sucursal/registrar-empleado"
                      method="post">
                    <div class="field">
                        <label for="nombre">Nombre completo</label>
                        <input type="text" id="nombre" name="nombre"
                               class="input" placeholder="Nombre apellido"/>
                    </div>
                    <div class="field">
                        <label for="dui">DUI</label>
                        <input type="text" id="dui" name="dui"
                               class="input" placeholder="00000000-0"/>
                    </div>
                    <div class="field">
                        <label for="correo">Correo electrónico</label>
                        <input type="email" id="correo" name="correo"
                               class="input" placeholder="correo@email.com"/>
                    </div>
                    <div class="field">
                        <label for="cargo">Cargo</label>
                        <select id="cargo" name="cargo" class="select">
                            <option value="CAJERO">Cajero</option>
                            <option value="RECEPCIONISTA">Recepcionista</option>
                            <option value="ASESOR">Asesor financiero</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="salario">Salario</label>
                        <input type="number" id="salario" name="salario"
                               class="input" placeholder="$0.00" step="0.01"/>
                    </div>
                    <button type="submit" class="btn btn-amber btn-block">
                        Enviar acción de personal
                    </button>
                </form>
            </div>
        </main>

    </div>

</body>
</html>
