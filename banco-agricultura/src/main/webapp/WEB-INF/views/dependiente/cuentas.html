<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Banco Agricultura — Cuentas del cliente</title>
    <link th:href="@{/resources/css/estilos.css}" rel="stylesheet"/>
</head>
<body>

    <!-- TOPBAR -->
    <nav class="topbar">
        <div class="brand">
            <div class="brand-icon-sm" style="background:var(--green)">BA</div>
            <span class="brand-text">Banco Agricultura</span>
        </div>
        <div class="user-info">
            <span class="user-badge badge-dependiente">Dependiente</span>
            <a href="/banco-agricultura/login" class="btn-logout">Cerrar sesión</a>
        </div>
    </nav>

    <div class="app-layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-label">Menú</div>
            <a href="/banco-agricultura/dependiente/buscar" class="nav-item active-green">
                Buscar cliente
            </a>
        </aside>

        <!-- CONTENIDO -->
        <main class="main-content">
            <div class="page-header">
                <a href="/banco-agricultura/dependiente/buscar"
                   style="font-size:13px; color:#6B7280; text-decoration:none;">
                    ← Buscar
                </a>
                <div class="page-title" style="margin-top:8px;">Cuentas del cliente</div>
            </div>

            <div class="card" style="max-width:540px;">

                <div class="info-row">
                    <span class="info-label">Cliente</span>
                    <span class="info-value" th:text="${nombreCliente}">Juan Pérez</span>
                </div>
                <div class="info-row">
                    <span class="info-label">DUI</span>
                    <span class="info-value" th:text="${duiCliente}">04829102-3</span>
                </div>

                <div style="margin-top:16px;">
                    <div class="sidebar-label" style="margin-bottom:8px;">Cuentas bancarias</div>
                    <div class="cuenta-card" style="margin-bottom:8px;">
                        <div class="cuenta-num">Cuenta #482910</div>
                        <div class="cuenta-saldo">$1,250.00</div>
                    </div>
                    <div class="cuenta-card" style="margin-bottom:16px;">
                        <div class="cuenta-num">Cuenta #739021</div>
                        <div class="cuenta-saldo">$340.50</div>
                    </div>
                </div>

                <div style="display:flex; gap:12px;">
                    <a href="/banco-agricultura/dependiente/abonar"
                       class="btn btn-green" style="flex:1; text-align:center; text-decoration:none;">
                        Abonar efectivo
                    </a>
                    <a href="/banco-agricultura/dependiente/retirar"
                       class="btn btn-outline" style="flex:1; text-align:center; text-decoration:none;">
                        Retirar efectivo
                    </a>
                </div>
            </div>
        </main>

    </div>

</body>
</html>
