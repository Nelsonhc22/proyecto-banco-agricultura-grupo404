<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Banco Agricultura — Transferencia</title>
    <link th:href="@{/resources/css/estilos.css}" rel="stylesheet"/>
</head>
<body>

    <!-- TOPBAR -->
    <nav class="topbar">
        <div class="brand">
            <div class="brand-icon-sm">BA</div>
            <span class="brand-text">Banco Agricultura</span>
        </div>
        <div class="user-info">
            <span class="user-badge badge-cliente">Cliente</span>
            <a href="/banco-agricultura/login" class="btn-logout">Cerrar sesión</a>
        </div>
    </nav>

    <div class="app-layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-label">Menú</div>
            <a href="/banco-agricultura/cliente/dashboard" class="nav-item">
                Mis cuentas
            </a>
            <a href="/banco-agricultura/cliente/transferencia" class="nav-item active-blue">
                Realizar transferencia
            </a>
        </aside>

        <!-- CONTENIDO -->
        <main class="main-content">
            <div class="page-header">
                <a href="/banco-agricultura/cliente/dashboard"
                   style="font-size:13px; color:#6B7280; text-decoration:none;">
                    ← Volver
                </a>
                <div class="page-title" style="margin-top:8px;">Transferencia</div>
                <div class="page-desc">Transfiere dinero a otra cuenta del banco</div>
            </div>

            <div class="card" style="max-width:500px;">
                <form action="/banco-agricultura/cliente/transferencia" method="post">

                    <div class="field">
                        <label>Cuenta origen</label>
                        <select class="select">
                            <option>Cuenta #482910 — $1,250.00</option>
                            <option>Cuenta #739021 — $340.50</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="cuentaDestino">Número de cuenta destino</label>
                        <input type="text" id="cuentaDestino" name="cuentaDestino"
                               class="input" placeholder="Ej. 739021"/>
                    </div>

                    <div class="field">
                        <label for="monto">Monto a transferir</label>
                        <input type="number" id="monto" name="monto"
                               class="input" placeholder="$0.00" step="0.01"/>
                    </div>

                    <div class="field">
                        <label for="descripcion">Descripción (opcional)</label>
                        <input type="text" id="descripcion" name="descripcion"
                               class="input" placeholder="Ej. pago de deuda"/>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">
                        Confirmar transferencia
                    </button>

                </form>
            </div>
        </main>

    </div>

</body>
</html>
