<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Banco Agricultura — Apertura de préstamo</title>
    <link th:href="@{/resources/css/estilos.css}" rel="stylesheet"/>
</head>
<body>

    <!-- TOPBAR -->
    <nav class="topbar">
        <div class="brand">
            <div class="brand-icon-sm" style="background:var(--purple)">BA</div>
            <span class="brand-text">Banco Agricultura</span>
        </div>
        <div class="user-info">
            <span class="user-badge badge-cajero">Cajero</span>
            <a href="/banco-agricultura/login" class="btn-logout">Cerrar sesión</a>
        </div>
    </nav>

    <div class="app-layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-label">Menú</div>
            <a href="/banco-agricultura/cajero/menu" class="nav-item">Panel principal</a>
            <a href="/banco-agricultura/cajero/registrar-cliente" class="nav-item">
                Registrar cliente
            </a>
            <a href="/banco-agricultura/cajero/agregar-dependiente" class="nav-item">
                Agregar dependiente
            </a>
            <a href="/banco-agricultura/cajero/deposito-retiro" class="nav-item">
                Depósito / retiro
            </a>
            <a href="/banco-agricultura/cajero/prestamo" class="nav-item active-purple">
                Apertura de préstamo
            </a>
        </aside>

        <!-- CONTENIDO -->
        <main class="main-content">
            <div class="page-header">
                <a href="/banco-agricultura/cajero/menu"
                   style="font-size:13px; color:#6B7280; text-decoration:none;">
                    ← Menú
                </a>
                <div class="page-title" style="margin-top:8px;">Apertura de préstamo</div>
            </div>

            <div class="card" style="max-width:500px;">
                <form action="/banco-agricultura/cajero/prestamo" method="post">

                    <div class="field">
                        <label for="dui">DUI del cliente</label>
                        <input type="text" id="dui" name="dui"
                               class="input" placeholder="00000000-0"/>
                    </div>

                    <div class="field">
                        <label for="salario">Salario mensual</label>
                        <input type="number" id="salario" name="salario"
                               class="input" placeholder="$0.00" step="0.01"
                               oninput="calcularPrestamo()"/>
                    </div>

                    <div class="field">
                        <label for="monto">Monto del préstamo</label>
                        <input type="number" id="monto" name="monto"
                               class="input" placeholder="$0.00" step="0.01"
                               oninput="calcularPrestamo()"/>
                    </div>

                    <hr style="border:none; border-top:1px solid var(--border); margin:16px 0;"/>

                    <div class="info-row">
                        <span class="info-label">Interés aplicable</span>
                        <span class="info-value" id="interes">—</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Cuota mensual estimada</span>
                        <span class="info-value" id="cuota">—</span>
                    </div>
                    <div class="info-row" style="margin-bottom:16px;">
                        <span class="info-label">Plazo estimado</span>
                        <span class="info-value" id="plazo">—</span>
                    </div>

                    <button type="submit" class="btn btn-purple btn-block">
                        Crear caso de préstamo
                    </button>

                </form>
            </div>
        </main>

    </div>

    <script>
        function calcularPrestamo() {
            const salario = parseFloat(document.getElementById('salario').value) || 0;
            const monto = parseFloat(document.getElementById('monto').value) || 0;

            if (salario <= 0 || monto <= 0) {
                document.getElementById('interes').textContent = '—';
                document.getElementById('cuota').textContent = '—';
                document.getElementById('plazo').textContent = '—';
                return;
            }

            // Tasa de interés según monto
            let tasa = 0.05;
            if (monto <= 5000) tasa = 0.03;
            else if (monto <= 15000) tasa = 0.04;

            // Cuota máxima = 30% del salario
            const cuotaMax = salario * 0.30;
            const interesMensual = tasa / 12;
            const plazoMeses = Math.ceil(
                Math.log(cuotaMax / (cuotaMax - monto * interesMensual)) /
                Math.log(1 + interesMensual)
            );
            const cuota = (monto * interesMensual) /
                (1 - Math.pow(1 + interesMensual, -plazoMeses));

            document.getElementById('interes').textContent =
                (tasa * 100).toFixed(0) + '% anual';
            document.getElementById('cuota').textContent =
                '$' + cuota.toFixed(2) + '/mes';
            document.getElementById('plazo').textContent =
                Math.ceil(plazoMeses / 12) + ' años (' + plazoMeses + ' meses)';
        }
    </script>

</body>
</html>
