<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Banco Agricultura — Agregar dependiente</title>
    <link th:href="@{/resources/css/estilos.css}" rel="stylesheet"/>
</head>
<body>

    <!-- TOPBAR -->
    <nav class="topbar">
        <div class="brand">
            <div class="brand-icon-sm" style="background:var(--purple)">BA</div>
            <span class="brand-text">Banco Agricultura</span>
        </div>
        <div class="user-info">
            <span class="user-badge badge-cajero">Cajero</span>
            <a href="/banco-agricultura/login" class="btn-logout">Cerrar sesión</a>
        </div>
    </nav>

    <div class="app-layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-label">Menú</div>
            <a href="/banco-agricultura/cajero/menu" class="nav-item">Panel principal</a>
            <a href="/banco-agricultura/cajero/registrar-cliente" class="nav-item">
                Registrar cliente
            </a>
            <a href="/banco-agricultura/cajero/agregar-dependiente"
               class="nav-item active-purple">
                Agregar dependiente
            </a>
            <a href="/banco-agricultura/cajero/deposito-retiro" class="nav-item">
                Depósito / retiro
            </a>
            <a href="/banco-agricultura/cajero/prestamo" class="nav-item">
                Apertura de préstamo
            </a>
        </aside>

        <!-- CONTENIDO -->
        <main class="main-content">
            <div class="page-header">
                <a href="/banco-agricultura/cajero/menu"
                   style="font-size:13px; color:#6B7280; text-decoration:none;">
                    ← Menú
                </a>
                <div class="page-title" style="margin-top:8px;">Agregar dependiente</div>
                <div class="page-desc">Registra un comercio como dependiente del banco</div>
            </div>

            <div class="card" style="max-width:500px;">
                <form action="/banco-agricultura/cajero/agregar-dependiente" method="post">
                    <div class="field">
                        <label for="nombre">Nombre completo</label>
                        <input type="text" id="nombre" name="nombre"
                               class="input" placeholder="Nombre apellido"/>
                    </div>
                    <div class="field">
                        <label for="dui">DUI</label>
                        <input type="text" id="dui" name="dui"
                               class="input" placeholder="00000000-0"/>
                    </div>
                    <div class="field">
                        <label for="correo">Correo electrónico</label>
                        <input type="email" id="correo" name="correo"
                               class="input" placeholder="correo@email.com"/>
                    </div>
                    <div class="field">
                        <label for="comercio">Nombre del comercio</label>
                        <input type="text" id="comercio" name="comercio"
                               class="input" placeholder="Ej. Farmacia San Juan"/>
                    </div>
                    <button type="submit" class="btn btn-purple btn-block">
                        Registrar dependiente
                    </button>
                </form>
            </div>
        </main>

    </div>

</body>
</html>
