<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Banco Agricultura — Depósito / Retiro</title>
    <link th:href="@{/resources/css/estilos.css}" rel="stylesheet"/>
</head>
<body>

    <!-- TOPBAR -->
    <nav class="topbar">
        <div class="brand">
            <div class="brand-icon-sm" style="background:var(--purple)">BA</div>
            <span class="brand-text">Banco Agricultura</span>
        </div>
        <div class="user-info">
            <span class="user-badge badge-cajero">Cajero</span>
            <a href="/banco-agricultura/login" class="btn-logout">Cerrar sesión</a>
        </div>
    </nav>

    <div class="app-layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-label">Menú</div>
            <a href="/banco-agricultura/cajero/menu" class="nav-item">Panel principal</a>
            <a href="/banco-agricultura/cajero/registrar-cliente" class="nav-item">
                Registrar cliente
            </a>
            <a href="/banco-agricultura/cajero/agregar-dependiente" class="nav-item">
                Agregar dependiente
            </a>
            <a href="/banco-agricultura/cajero/deposito-retiro" class="nav-item active-purple">
                Depósito / retiro
            </a>
            <a href="/banco-agricultura/cajero/prestamo" class="nav-item">
                Apertura de préstamo
            </a>
        </aside>

        <!-- CONTENIDO -->
        <main class="main-content">
            <div class="page-header">
                <a href="/banco-agricultura/cajero/menu"
                   style="font-size:13px; color:#6B7280; text-decoration:none;">
                    ← Menú
                </a>
                <div class="page-title" style="margin-top:8px;">Depósito / retiro</div>
            </div>

            <div class="card" style="max-width:500px;">
                <form action="/banco-agricultura/cajero/deposito-retiro" method="post">
                    <div class="field">
                        <label for="dui">DUI del cliente</label>
                        <input type="text" id="dui" name="dui"
                               class="input" placeholder="00000000-0"/>
                    </div>
                    <div class="field">
                        <label for="numeroCuenta">Número de cuenta</label>
                        <input type="text" id="numeroCuenta" name="numeroCuenta"
                               class="input" placeholder="Ej. 482910"/>
                    </div>
                    <div class="field">
                        <label for="tipoOperacion">Tipo de operación</label>
                        <select id="tipoOperacion" name="tipoOperacion" class="select">
                            <option value="DEPOSITO">Depósito</option>
                            <option value="RETIRO">Retiro</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="monto">Monto</label>
                        <input type="number" id="monto" name="monto"
                               class="input" placeholder="$0.00" step="0.01"/>
                    </div>
                    <button type="submit" class="btn btn-purple btn-block">
                        Realizar operación
                    </button>
                </form>
            </div>
        </main>

    </div>

</body>
</html>
